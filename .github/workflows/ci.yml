name: CI

# Runs on every push (any branch — so checks run as soon as you push) and on
# every PR into main (the required gate before merging).
on:
  push:
  pull_request:
    branches: [main]

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Type-checks + compiles. Backend runs `tsc`; frontend runs `tsc && vite build`.
      - name: Build
        run: npm run build

      # Jest + Supertest unit/route tests (backend only for now)
      - name: Test
        if: matrix.app == 'backend'
        run: npm test -- --ci
