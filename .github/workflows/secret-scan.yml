name: Secret Scan

# Catch API keys, tokens, or other secrets before they reach main. Runs on every
# push and PR, scanning the full history so nothing slips through.
on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full git history so past commits are scanned too

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for GitHub *organizations*;
          # personal/public repos run free.
